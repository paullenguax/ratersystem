name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ratersystem
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BENCHMARK_API_KEY:            ${{ secrets.VITE_BENCHMARK_API_KEY }}
          VITE_BENCHMARK_AUTH_DOMAIN:        ${{ secrets.VITE_BENCHMARK_AUTH_DOMAIN }}
          VITE_BENCHMARK_PROJECT_ID:         ${{ secrets.VITE_BENCHMARK_PROJECT_ID }}
          VITE_BENCHMARK_STORAGE_BUCKET:     ${{ secrets.VITE_BENCHMARK_STORAGE_BUCKET }}
          VITE_BENCHMARK_MESSAGING_SENDER_ID: ${{ secrets.VITE_BENCHMARK_MESSAGING_SENDER_ID }}
          VITE_BENCHMARK_APP_ID:             ${{ secrets.VITE_BENCHMARK_APP_ID }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: lenguax.com/public_html/ratersystem/
          dangerous-clean-slate: false
